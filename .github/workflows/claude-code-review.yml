name: Claude AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD)
          
          # Save diff to file for processing
          echo "$DIFF" > pr_diff.txt
          
          # Get changed files list
          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create review script
        run: |
          cat > review.js << 'SCRIPT_EOF'
          const https = require('https');
          const fs = require('fs');

          const ANTHROPIC_API_KEY = process.env.ANTHROPIC_API_KEY;
          const PR_DIFF = fs.readFileSync('pr_diff.txt', 'utf8');
          const PR_TITLE = process.env.PR_TITLE;
          const PR_BODY = process.env.PR_BODY || 'No description provided';

          const prompt = `You are an expert code reviewer specializing in Playwright test automation and TypeScript.

          Review this Pull Request:
          
          Title: ${PR_TITLE}
          Description: ${PR_BODY}
          
          Code Changes:
          \`\`\`diff
          ${PR_DIFF.substring(0, 15000)}
          \`\`\`
          
          Provide a thorough code review focusing on:
          1. Test quality and coverage
          2. Playwright best practices
          3. Code maintainability and readability
          4. Potential bugs or issues
          5. Performance considerations
          6. TypeScript type safety
          
          Format your response as:
          ## 🤖 Claude AI Code Review
          
          ### Summary
          [Brief overview]
          
          ### Strengths
          - [What's good]
          
          ### Issues Found
          - [Critical/Important issues]
          
          ### Suggestions
          - [Improvements]
          
          ### Security & Best Practices
          - [Any concerns]
          
          Keep it concise but thorough.`;

          const data = JSON.stringify({
            model: 'claude-3-5-sonnet-20241022',
            max_tokens: 4096,
            messages: [{
              role: 'user',
              content: prompt
            }]
          });

          const options = {
            hostname: 'api.anthropic.com',
            path: '/v1/messages',
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': ANTHROPIC_API_KEY,
              'anthropic-version': '2023-06-01',
              'Content-Length': data.length
            }
          };

          const req = https.request(options, (res) => {
            let responseData = '';

            res.on('data', (chunk) => {
              responseData += chunk;
            });

            res.on('end', () => {
              try {
                const response = JSON.parse(responseData);
                if (response.content && response.content[0]) {
                  const review = response.content[0].text;
                  fs.writeFileSync('review_output.txt', review);
                  console.log('Review completed successfully');
                } else {
                  console.error('Unexpected response format:', responseData);
                  process.exit(1);
                }
              } catch (error) {
                console.error('Error parsing response:', error);
                console.error('Response:', responseData);
                process.exit(1);
              }
            });
          });

          req.on('error', (error) => {
            console.error('Request error:', error);
            process.exit(1);
          });

          req.write(data);
          req.end();
          SCRIPT_EOF

      - name: Run Claude review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node review.js

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review_output.txt', 'utf8');
            
            const changedFiles = `${{ steps.diff.outputs.changed_files }}`.split('\n').filter(f => f);
            const fileList = changedFiles.map(f => `- \`${f}\``).join('\n');
            
            const comment = `${review}
            
            ---
            
            **Files Reviewed (${changedFiles.length}):**
            ${fileList}
            
            *Powered by Claude AI (Anthropic)*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Cleanup
        if: always()
        run: |
          rm -f pr_diff.txt review_output.txt review.js
