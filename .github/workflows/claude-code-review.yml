name: Claude AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD)
          
          # Save diff to file for processing
          echo "$DIFF" > pr_diff.txt
          
          # Get changed files list
          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create review script
        run: |
          cat > review.js << 'SCRIPT_EOF'
          const https = require('https');
          const fs = require('fs');

          const ANTHROPIC_API_KEY = process.env.ANTHROPIC_API_KEY;
          let prDiff = fs.readFileSync('pr_diff.txt', 'utf8');
          const prTitle = process.env.PR_TITLE || 'No title';
          const prBody = process.env.PR_BODY || 'No description provided';

          // Limit diff size to prevent oversized requests
          if (prDiff.length > 8000) {
            prDiff = prDiff.substring(0, 8000) + '\n\n... (diff truncated for review)';
          }

          const prompt = "You are an expert code reviewer specializing in Playwright test automation and TypeScript.\n\n" +
            "Review this Pull Request:\n\n" +
            "Title: " + prTitle + "\n" +
            "Description: " + prBody + "\n\n" +
            "Code Changes:\n```diff\n" + prDiff + "\n```\n\n" +
            "Provide a thorough code review focusing on:\n" +
            "1. Test quality and coverage\n" +
            "2. Playwright best practices\n" +
            "3. Code maintainability and readability\n" +
            "4. Potential bugs or issues\n" +
            "5. Performance considerations\n" +
            "6. TypeScript type safety\n\n" +
            "Format your response as:\n" +
            "## 🤖 Claude AI Code Review\n\n" +
            "### Summary\n[Brief overview]\n\n" +
            "### Strengths\n- [What's good]\n\n" +
            "### Issues Found\n- [Critical/Important issues]\n\n" +
            "### Suggestions\n- [Improvements]\n\n" +
            "### Security & Best Practices\n- [Any concerns]\n\n" +
            "Keep it concise but thorough.";

          const requestBody = {
            model: 'claude-3-5-sonnet-20241022',
            max_tokens: 4096,
            messages: [{
              role: 'user',
              content: prompt
            }]
          };

          const data = JSON.stringify(requestBody);

          const options = {
            hostname: 'api.anthropic.com',
            path: '/v1/messages',
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': ANTHROPIC_API_KEY,
              'anthropic-version': '2023-06-01',
              'Content-Length': data.length
            }
          };

          const req = https.request(options, (res) => {
            let responseData = '';

            res.on('data', (chunk) => {
              responseData += chunk;
            });

            res.on('end', () => {
              try {
                const response = JSON.parse(responseData);
                if (response.content && response.content[0]) {
                  const review = response.content[0].text;
                  fs.writeFileSync('review_output.txt', review);
                  console.log('Review completed successfully');
                } else {
                  console.error('Unexpected response format:', responseData);
                  process.exit(1);
                }
              } catch (error) {
                console.error('Error parsing response:', error);
                console.error('Response:', responseData);
                process.exit(1);
              }
            });
          });

          req.on('error', (error) => {
            console.error('Request error:', error);
            process.exit(1);
          });

          req.write(data);
          req.end();
          SCRIPT_EOF

      - name: Run Claude review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node review.js

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review_output.txt', 'utf8');
            
            const changedFiles = `${{ steps.diff.outputs.changed_files }}`.split('\n').filter(f => f);
            const fileList = changedFiles.map(f => `- \`${f}\``).join('\n');
            
            const comment = `${review}
            
            ---
            
            **Files Reviewed (${changedFiles.length}):**
            ${fileList}
            
            *Powered by Claude AI (Anthropic)*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Cleanup
        if: always()
        run: |
          rm -f pr_diff.txt review_output.txt review.js
